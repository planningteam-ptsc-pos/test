<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Explorer & Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .model-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .model-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        
        .chat-bubble-ai { @apply bg-white border border-slate-200 text-slate-700 rounded-2xl rounded-tl-none shadow-sm; }
        .chat-bubble-user { @apply bg-indigo-600 text-white rounded-2xl rounded-tr-none shadow-md; }
        
        .markdown-content p { margin-bottom: 0.75rem; }
        .markdown-content pre { 
            background: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.75rem; 
            overflow-x: auto; margin: 0.5rem 0; font-size: 0.85rem;
        }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        @keyframes dot-pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        .dot { animation: dot-pulse 1.5s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- VIEW 1: EXPLORER -->
    <div id="explorer-view" class="max-w-5xl mx-auto p-4 md:p-8 animate-in fade-in duration-500">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2 tracking-tight">Gemini Explorer</h1>
            <p class="text-slate-500">Khám phá và bắt đầu trò chuyện với bất kỳ mô hình nào</p>
        </header>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1 w-full">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">API Key của bạn:</label>
                    <input 
                        type="password" 
                        id="api-key-input" 
                        placeholder="Nhập API Key để bắt đầu..." 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                    >
                </div>
                <button 
                    onclick="fetchModels()" 
                    id="fetch-btn"
                    class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-100 transition-all whitespace-nowrap"
                >
                    Tìm kiếm Mô hình
                </button>
            </div>
            <p id="status-text" class="text-[11px] text-slate-400 mt-3 italic text-center md:text-left"></p>
        </div>

        <div id="models-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Thẻ mô hình sẽ hiện ở đây -->
        </div>
    </div>

    <!-- VIEW 2: CHAT INTERFACE (Hidden by default) -->
    <div id="chat-view" class="hidden h-screen flex flex-col max-w-5xl mx-auto animate-in slide-in-from-right-8 duration-500">
        <!-- Chat Header -->
        <header class="p-4 md:p-6 bg-white border-b border-slate-200 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="backToExplorer()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div>
                    <h2 id="chat-model-name" class="font-bold text-slate-900">Model Name</h2>
                    <div class="flex items-center gap-1.5">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Đang kết nối</span>
                    </div>
                </div>
            </div>
            <button onclick="clearChat()" class="text-xs font-semibold text-slate-400 hover:text-red-500 transition-colors uppercase">Xóa hội thoại</button>
        </header>

        <!-- Chat History -->
        <main id="chat-history" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
            <div id="welcome-msg" class="text-center py-12">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>
                <p class="text-slate-500 font-medium">Phòng chat đã sẵn sàng. Hãy đặt câu hỏi cho mô hình này!</p>
            </div>
        </main>

        <!-- Typing Indicator -->
        <div id="typing-indicator" class="hidden px-8 py-2">
            <div class="flex items-center gap-2 text-slate-400 text-xs italic">
                <span>AI đang trả lời</span>
                <div class="flex gap-1">
                    <span class="dot w-1 h-1 bg-slate-300 rounded-full"></span>
                    <span class="dot w-1 h-1 bg-slate-300 rounded-full" style="animation-delay: 0.2s"></span>
                    <span class="dot w-1 h-1 bg-slate-300 rounded-full" style="animation-delay: 0.4s"></span>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <footer class="p-4 md:p-6 bg-white border-t border-slate-200">
            <div class="flex gap-3 max-w-4xl mx-auto items-end">
                <textarea 
                    id="chat-input" 
                    rows="1" 
                    placeholder="Nhập câu hỏi của bạn..." 
                    class="flex-1 p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none resize-none transition-all"
                ></textarea>
                <button 
                    id="send-btn" 
                    onclick="sendMessage()"
                    class="p-4 bg-indigo-600 text-white rounded-2xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all disabled:opacity-50"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </footer>
    </div>

    <script>
        let currentApiKey = "";
        let currentModel = "";
        const envApiKey = ""; // Tự động lấy nếu có

        // --- Logic Explorer ---

        async function fetchModels() {
            const inputKey = document.getElementById('api-key-input').value;
            currentApiKey = inputKey || envApiKey;
            const btn = document.getElementById('fetch-btn');
            const listContainer = document.getElementById('models-list');
            const statusText = document.getElementById('status-text');

            if (!currentApiKey) {
                alert("Vui lòng nhập API Key!");
                return;
            }

            listContainer.innerHTML = "";
            btn.disabled = true;
            btn.textContent = "Đang quét...";
            statusText.textContent = "Đang tải danh sách mô hình từ Google...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${currentApiKey}`);
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || "Lỗi API");
                }

                const data = await response.json();
                const models = data.models || [];
                statusText.textContent = `Tìm thấy ${models.length} mô hình khả dụng. Nhấn "Bắt đầu Chat" để trải nghiệm.`;
                renderModels(models);
            } catch (error) {
                statusText.textContent = "Lỗi: " + error.message;
                statusText.classList.replace('text-slate-400', 'text-red-500');
            } finally {
                btn.disabled = false;
                btn.textContent = "Tìm kiếm Mô hình";
            }
        }

        function renderModels(models) {
            const listContainer = document.getElementById('models-list');
            models.forEach(model => {
                const shortName = model.name.replace('models/', '');
                const supportsChat = model.supportedGenerationMethods.includes('generateContent');
                
                const card = document.createElement('div');
                card.className = "model-card bg-white border border-slate-200 rounded-3xl p-6 flex flex-col";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-bold text-slate-800 text-lg">${shortName}</h3>
                        <span class="px-2 py-1 rounded-md text-[10px] font-bold uppercase ${supportsChat ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'}">
                            ${supportsChat ? 'Hỗ trợ Chat' : 'Không hỗ trợ Chat'}
                        </span>
                    </div>
                    <p class="text-sm text-slate-500 mb-6 flex-1 line-clamp-3">${model.description || "Không có mô tả."}</p>
                    <div class="flex gap-2">
                        <button 
                            onclick="startChat('${shortName}')"
                            ${!supportsChat ? 'disabled' : ''}
                            class="flex-1 py-3 bg-indigo-50 text-indigo-600 font-bold rounded-xl hover:bg-indigo-600 hover:text-white transition-all disabled:opacity-30 disabled:hover:bg-indigo-50 disabled:hover:text-indigo-600"
                        >
                            Bắt đầu Chat
                        </button>
                        <button 
                            onclick="copyToClipboard('${shortName}')"
                            class="px-4 py-3 bg-slate-50 text-slate-400 rounded-xl hover:bg-slate-100 transition-all"
                            title="Sao chép ID"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        </button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        // --- Logic Chat ---

        function startChat(modelId) {
            currentModel = modelId;
            document.getElementById('chat-model-name').textContent = modelId;
            document.getElementById('explorer-view').classList.add('hidden');
            document.getElementById('chat-view').classList.remove('hidden');
            document.getElementById('chat-input').focus();
        }

        function backToExplorer() {
            document.getElementById('chat-view').classList.add('hidden');
            document.getElementById('explorer-view').classList.remove('hidden');
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            input.style.height = 'auto';
            document.getElementById('welcome-msg')?.classList.add('hidden');

            appendMessage('user', text);
            toggleLoading(true);

            try {
                const response = await callGemini(text);
                appendMessage('ai', response);
            } catch (error) {
                appendMessage('ai', `**Lỗi:** ${error.message}`);
            } finally {
                toggleLoading(false);
            }
        }

        async function callGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${currentApiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || "Lỗi kết nối API");
            }

            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "Mô hình không trả về kết quả.";
        }

        function appendMessage(role, text) {
            const history = document.getElementById('chat-history');
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-4 duration-300`;
            
            const isAI = role === 'ai';
            wrapper.innerHTML = `
                <div class="max-w-[85%] md:max-w-[75%] ${isAI ? 'chat-bubble-ai' : 'chat-bubble-user'} p-4 text-sm leading-relaxed">
                    ${isAI ? `<div class="markdown-content">${marked.parse(text)}</div>` : `<div class="whitespace-pre-wrap">${text}</div>`}
                </div>
            `;
            
            history.appendChild(wrapper);
            history.scrollTop = history.scrollHeight;
        }

        function toggleLoading(isLoading) {
            document.getElementById('typing-indicator').classList.toggle('hidden', !isLoading);
            document.getElementById('send-btn').disabled = isLoading;
            document.getElementById('chat-history').scrollTop = document.getElementById('chat-history').scrollHeight;
        }

        function clearChat() {
            document.getElementById('chat-history').innerHTML = `
                <div id="welcome-msg" class="text-center py-12">
                    <p class="text-slate-500 font-medium">Hội thoại đã được làm mới.</p>
                </div>
            `;
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert(`Đã sao chép ID: ${text}`);
        }

        // Tự động quét khi load trang nếu có sẵn key
        window.onload = () => {
            if (envApiKey) fetchModels();
            
            // Xử lý textarea tự tăng chiều cao
            const textarea = document.getElementById('chat-input');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        };
    </script>
</body>
</html>
