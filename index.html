<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1f2937;
            margin: 0;
            padding: 0;
            font-size: 16px;
        }
        .bg-fixed-overlay {
            position: fixed; top: 0vh; bottom: 0vh; left: -2vw; right: -2vw;
            background-size: cover !important;
            background-position: center center !important;
            background-repeat: no-repeat !important;
            z-index: -1;
        }
        .chatbot-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background-color: #10b981;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            z-index: 1000;
        }
        .chatbot-window {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 350px;
            height: 400px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: none;
            flex-direction: column;
        }
        .chatbot-header {
            background-color: #10b981;
            color: white;
            padding: 10px;
            border-radius: 12px 12px 0 0;
            font-weight: bold;
        }
        .chatbot-body {
            padding: 10px;
            flex: 1;
            overflow-y: auto;
        }
        .chatbot-footer {
            padding: 10px;
            background-color: #f1f5f9;
            border-radius: 0 0 12px 12px;
        }
        .chat-message {
            margin-bottom: 10px;
        }
        .user-message {
            text-align: right;
            font-weight: bold;
            color: #10b981;
        }
        .bot-message {
            text-align: left;
            color: #1f2937;
        }
        .message-text {
            background-color: #e2e8f0;
            padding: 8px;
            border-radius: 8px;
            max-width: 70%;
            display: inline-block;
        }
        #loadingSpinner {
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

<!-- Chatbot Widget -->
<div id="chatbotWidget" class="chatbot-widget">
    <span>💬</span>
</div>

<!-- Chatbot Window -->
<div id="chatbotWindow" class="chatbot-window">
    <div class="chatbot-header">
        AI Career Assistant
    </div>
    <div class="chatbot-body" id="chatbotBody"></div>
    <div class="chatbot-footer">
        <input type="text" id="userInput" class="w-full p-2 border rounded" placeholder="Hãy hỏi tôi một câu..." />
        <button id="sendMessageButton" class="w-full p-2 mt-2 bg-green-500 text-white rounded">Gửi</button>
        <div id="loadingSpinner">Đang xử lý...</div>
    </div>
</div>

<script>
// API Key Gemini (Thay thế với API key thật của bạn)
const GEMINI_API_KEY = "PASTE_YOUR_GEMINI_API_KEY_HERE";

// Fetch dữ liệu từ Google Sheets CSV
const sheetUrl = "https://docs.google.com/spreadsheets/d/1aWQVU9ROmEere2vvPSF5WZNdqjVRFrjMtTHEwPTBX6M/export?format=csv&gid=0";
let roadmapData = [];

// Lấy dữ liệu từ Google Sheet
async function fetchData() {
    const response = await fetch(sheetUrl);
    const csvData = await response.text();
    roadmapData = parseCSV(csvData);
}

// Hàm phân tích CSV
function parseCSV(csvText) {
    const rows = [];
    let current = '';
    let row = [];
    let inQuotes = false;
    for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];
        const nextChar = csvText[i + 1];
        if (char === '"') {
            if (inQuotes && nextChar === '"') { current += '"'; i++; } else { inQuotes = !inQuotes; }
        } else if (char === ',' && !inQuotes) { row.push(current.trim()); current = ''; }
        else if ((char === '\n' || char === '\r') && !inQuotes) {
            if (char === '\r' && nextChar === '\n') i++;
            row.push(current.trim()); current = '';
            rows.push(row);
            row = [];
        } else { current += char; }
    }
    if (current.length > 0 || row.length > 0) { row.push(current.trim()); rows.push(row); }
    return rows.slice(1).map(row => ({
        job_family: row[0],
        function_title: row[1],
        milestone_order: row[2],
        milestone_level: row[3],
        role_title: row[4],
        role_purpose: row[5],
        key_responsibilities: row[6],
        competencies_to_develop: row[7],
        technical_skills_tools: row[8],
        behavioral_leadership_skills: row[9],
        key_outputs_kpis: row[10],
        typical_scope: row[11],
        suggested_training_development: row[12],
        recommended_certifications: row[13],
        readiness_indicators: row[14],
        promotion_criteria: row[15],
        development_opportunity: row[16],
        long_term_direction: row[17],
        next_target_role: row[18]
    }));
}

// Hiển thị câu trả lời từ bot
function displayMessage(message, isUser = false) {
    const messageElement = document.createElement("div");
    messageElement.classList.add("chat-message");
    messageElement.classList.add(isUser ? "user-message" : "bot-message");
    messageElement.innerHTML = `<span class="message-text">${message}</span>`;
    document.getElementById("chatbotBody").appendChild(messageElement);
    document.getElementById("chatbotBody").scrollTop = document.getElementById("chatbotBody").scrollHeight;
}

// Gửi câu hỏi từ người dùng
async function sendMessage() {
    const userInput = document.getElementById("userInput").value.trim();
    if (userInput === "") return;

    displayMessage(userInput, true);
    document.getElementById("userInput").value = "";
    document.getElementById("loadingSpinner").style.display = "block";

    const prompt = createPrompt(userInput);
    const response = await callGeminiAPI(prompt);
    displayMessage(response);
    document.getElementById("loadingSpinner").style.display = "none";
}

// Tạo prompt từ câu hỏi của người dùng
function createPrompt(userInput) {
    return `
    Bạn là trợ lý nghề nghiệp AI cho nền tảng Career Pathway trong ngành dầu khí/offshore. 
    Hãy trả lời câu hỏi của ứng viên dựa trên các dữ liệu từ Roadmap sau:

    Câu hỏi: ${userInput}

    Dữ liệu Roadmap: ${JSON.stringify(roadmapData)}
    `;
}

// Gọi API Gemini
async function callGeminiAPI(prompt) {
    const response = await fetch('https://api.google.com/v1/gemini', {
        method: 'POST',
        headers: {
            'Authorization': `Bearer ${GEMINI_API_KEY}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            prompt: prompt,
            max_tokens: 150
        })
    });
    const data = await response.json();
    return data.choices[0].text.trim();
}

// Mở và đóng cửa sổ chatbot
document.getElementById("chatbotWidget").addEventListener("click", () => {
    const chatbotWindow = document.getElementById("chatbotWindow");
    chatbotWindow.style.display = chatbotWindow.style.display === "flex" ? "none" : "flex";
});

// Gửi câu hỏi khi nhấn Enter
document.getElementById("sendMessageButton").addEventListener("click", sendMessage);
document.getElementById("userInput").addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});

// Khởi tạo dữ liệu
fetchData().then(() => {
    displayMessage("Chào bạn! Tôi là AI Career Assistant. Hãy hỏi tôi về ngành nghề trong dầu khí/offshore!");
});
</script>
</body>
</html>
