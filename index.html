<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .chat-container {
      width: 400px;
      max-width: 100%;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 20px;
    }
    .chat-box {
      height: 300px;
      overflow-y: auto;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      background-color: #f9f9f9;
    }
    .input-box {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      background-color: #fff;
    }
    .button {
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-box" id="chatBox"></div>
  <input type="text" id="userInput" class="input-box" placeholder="Nhập câu hỏi của bạn...">
  <button class="button" onclick="sendMessage()">Gửi</button>
</div>

<script>
  const chatBox = document.getElementById('chatBox');
  const userInput = document.getElementById('userInput');

  // Function to send message to the API and get the response
  async function sendMessage() {
    const userMessage = userInput.value;
    if (!userMessage) return;

    // Add user message to the chat box
    chatBox.innerHTML += `<div><b>Bạn:</b> ${userMessage}</div>`;
    userInput.value = '';
    chatBox.scrollTop = chatBox.scrollHeight;

    // Send message to the AI API (Gemini API in this example)
    const response = await callAI(userMessage);

    // Add AI response to the chat box
    chatBox.innerHTML += `<div><b>AI:</b> ${response}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // Call API to get the AI response
  async function callAI(message) {
    const apiKey = 'YOUR_API_KEY'; // Replace with your own API key
    const url = 'https://api.gemini.com/v1/chat'; // Replace with your chosen API endpoint

    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({ input: message })
    });

    const data = await response.json();
    return data.reply || 'Xin lỗi, tôi không hiểu câu hỏi của bạn.';
  }
</script>

</body>
</html>
