<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oil & Gas Career Pro Navigator | Responsive Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: 'rgb(var(--color-primary-50) / <alpha-value>)',
                            100: 'rgb(var(--color-primary-100) / <alpha-value>)',
                            400: 'rgb(var(--color-primary-400) / <alpha-value>)',
                            500: 'rgb(var(--color-primary-500) / <alpha-value>)',
                            600: 'rgb(var(--color-primary-600) / <alpha-value>)',
                        }
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --color-primary-50: 240 249 255;
            --color-primary-100: 224 242 254;
            --color-primary-400: 56 189 248;
            --color-primary-500: 14 165 233;
            --color-primary-600: 2 132 199;
            --sky-primary: #0ea5e9;
            --amber-peak: #f59e0b;
            --oil-slate: #0f172a;
        }

        [data-theme="emerald"] { --color-primary-50: 236 253 245; --color-primary-100: 209 250 229; --color-primary-400: 52 211 153; --color-primary-500: 16 185 129; --color-primary-600: 5 150 105; --sky-primary: #10b981; }
        [data-theme="violet"] { --color-primary-50: 245 243 255; --color-primary-100: 237 233 254; --color-primary-400: 167 139 250; --color-primary-500: 139 92 246; --color-primary-600: 124 58 237; --sky-primary: #8b5cf6; }
        [data-theme="rose"] { --color-primary-50: 255 241 242; --color-primary-100: 255 228 230; --color-primary-400: 251 113 133; --color-primary-500: 244 63 94; --color-primary-600: 225 29 72; --sky-primary: #f43f5e; }
        [data-theme="amber"] { --color-primary-50: 255 251 235; --color-primary-100: 254 243 199; --color-primary-400: 251 191 36; --color-primary-500: 245 158 11; --color-primary-600: 217 119 6; --sky-primary: #f59e0b; }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: var(--oil-slate); }

        .bg-fixed-overlay { position: fixed; inset: 0; background-size: cover; background-position: center; z-index: -1; transition: background-image 1s ease; opacity: 0.6; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); }

        /* ROADMAP RESPONSIVE */
        .roadmap-viewport { 
            position: relative; width: 100%; height: 100%; border-radius: 24px; 
            background: radial-gradient(circle at top right, #ffffff 0%, #f1f5f9 100%);
            overflow-x: hidden; overflow-y: auto; 
        }

        /* Mobile specific roadmap list */
        .mobile-roadmap-list { display: flex; flex-direction: column; gap: 1rem; padding: 1.5rem; width: 100%; }

        .node-card {
            background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .node-card:active { transform: scale(0.98); }
        
        .node-circle {
            width: 28px; height: 28px; border-radius: 50%; color: white;
            display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px;
            border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Dashboards / Stepper */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .tab-btn { white-space: nowrap; padding: 12px 16px; font-weight: 800; font-size: 13px; color: #94a3b8; transition: 0.3s; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--sky-primary); border-bottom-color: var(--sky-primary); }

        .animate-up { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Role Selection Dropup */
        #dropdownMenu { max-width: 90vw; left: 50%; transform: translateX(-50%); width: 100%; }

        @media (min-width: 1024px) {
            .roadmap-viewport { overflow: hidden; border-radius: 40px; }
            #dropdownMenu { max-width: 100%; left: 0; transform: none; }
            .node-card { width: 180px; position: absolute; }
        }
    </style>
</head>
<body class="flex flex-col">

<div class="bg-fixed-overlay" id="bgOverlay"></div>

<div id="app" class="absolute inset-0 flex flex-col p-3 md:p-6 lg:p-8 overflow-hidden">
    
    <!-- TOP NAV -->
    <div class="flex justify-between items-start z-[100] mb-2 shrink-0">
        <div id="themeSelectorContainer">
            <div class="relative">
                <button onclick="toggleThemeMenu(event)" class="bg-white/80 backdrop-blur-md border border-slate-200/60 shadow-sm px-3 py-2 rounded-full text-slate-700 font-black text-[11px] uppercase tracking-wider flex items-center gap-2">
                    <i data-lucide="palette" class="w-3.5 h-3.5 text-primary-600"></i> <span class="hidden sm:inline">Theme</span>
                </button>
                <div id="themeMenu" class="absolute top-full left-0 mt-2 w-40 bg-white shadow-xl rounded-2xl overflow-hidden hidden p-1">
                    <button onclick="setTheme('default')" class="w-full flex items-center gap-2 px-3 py-2 hover:bg-slate-50 text-[12px] font-bold text-slate-600"><span class="w-3 h-3 rounded-full bg-[#0ea5e9]"></span> Blue</button>
                    <button onclick="setTheme('emerald')" class="w-full flex items-center gap-2 px-3 py-2 hover:bg-slate-50 text-[12px] font-bold text-slate-600"><span class="w-3 h-3 rounded-full bg-[#10b981]"></span> Green</button>
                    <button onclick="setTheme('rose')" class="w-full flex items-center gap-2 px-3 py-2 hover:bg-slate-50 text-[12px] font-bold text-slate-600"><span class="w-3 h-3 rounded-full bg-[#f43f5e]"></span> Rose</button>
                </div>
            </div>
        </div>
        <img id="mainLogo" src="image/background/logo.png" alt="O&G Logo" class="w-24 md:w-40 object-contain opacity-90">
    </div>

    <!-- PAGE 1: SELECTION -->
    <div id="page1" class="flex-1 flex flex-col items-center justify-center space-y-6 overflow-y-auto custom-scrollbar px-2">
        <div class="text-center space-y-4 animate-up">
            <div class="inline-flex items-center gap-2 bg-white/60 backdrop-blur px-4 py-1.5 rounded-full text-[11px] font-black uppercase tracking-widest border border-white shadow-sm">
                <i data-lucide="shield-check" class="w-3 h-3 text-primary-600"></i> Professional Edition
            </div>
            <div class="bg-white/40 backdrop-blur-md border border-white/60 shadow-xl rounded-[2rem] p-6 md:p-10 max-w-2xl">
                <h1 class="text-3xl md:text-6xl font-black text-slate-900 tracking-tighter leading-none mb-2">
                    CAREER <span class="text-primary-600">PATHWAY</span>
                </h1>
                <p class="text-slate-600 font-medium text-sm md:text-lg">Định hướng sự nghiệp ngành Dầu khí</p>
            </div>
        </div>

        <div class="glass-panel p-6 md:p-8 rounded-[32px] w-full max-w-md space-y-6 shadow-xl">
            <div class="space-y-4">
                <div>
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-2">Dữ liệu nguồn (.xlsx)</label>
                    <input type="file" id="excelInput" accept=".xlsx, .xls" class="block w-full text-xs text-slate-500 file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-slate-900 file:text-white border border-slate-100 rounded-2xl p-1.5 bg-white/50">
                </div>
                <div class="relative">
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest block mb-2">Chọn lộ trình</label>
                    <button id="dropdownTrigger" class="w-full bg-white border border-slate-100 text-slate-400 rounded-2xl px-5 py-3 flex justify-between items-center font-bold text-sm shadow-sm opacity-60 cursor-not-allowed">
                        <span id="dropdownSelectedText" class="truncate">Đang chờ dữ liệu...</span>
                        <i data-lucide="chevron-down" class="w-4 h-4 shrink-0" id="dropdownIcon"></i>
                    </button>
                    <div id="dropdownMenu" class="absolute z-[200] bottom-full mb-3 bg-white/95 backdrop-blur-xl border border-slate-100 shadow-2xl rounded-2xl overflow-hidden hidden flex flex-col">
                        <div class="p-2 border-b border-slate-100">
                            <input type="text" id="roleSearchInput" placeholder="Tìm kiếm..." class="w-full bg-slate-50 border border-slate-200 text-sm font-bold rounded-xl px-3 py-2 outline-none">
                        </div>
                        <ul id="customRoleList" class="max-h-[200px] overflow-y-auto custom-scrollbar p-1"></ul>
                    </div>
                </div>
            </div>
            <button id="btnStart" class="w-full bg-primary-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-primary-600/20 flex items-center justify-center gap-2 uppercase tracking-widest text-xs opacity-60 cursor-not-allowed">
                Khám phá ngay <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <!-- PAGE 1.5: OVERVIEW -->
    <div id="pageOverview" class="hidden h-full flex flex-col gap-4 animate-up overflow-hidden">
        <div class="flex items-center justify-between shrink-0 px-1">
            <button onclick="showPage(1)" class="p-2.5 rounded-full bg-white/80 border border-slate-200 text-slate-700 shadow-sm"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
            <div class="text-center">
                <div class="text-[10px] font-black text-primary-600 uppercase tracking-widest mb-0.5">Career Strategy</div>
                <h2 class="text-lg md:text-2xl font-black text-slate-900 uppercase">ROADMAP</h2>
            </div>
            <button id="btnGoToDetail" class="bg-primary-600 text-white px-4 py-2 rounded-xl font-bold text-xs uppercase tracking-tighter">Chi tiết</button>
        </div>

        <div class="flex-1 flex flex-col lg:flex-row gap-4 min-h-0 overflow-hidden">
            <div class="flex-1 roadmap-viewport" id="roadmapViewport">
                <div id="roadmapContent" class="h-full">
                    <!-- Sẽ Render List trên mobile, SVG trên Desktop -->
                </div>
            </div>
            
            <!-- Sidebar summary - Hidden on mobile, shown in modal or below if needed -->
            <div id="overviewSidebar" class="hidden lg:flex flex-col gap-3 w-72 shrink-0 overflow-y-auto custom-scrollbar">
                <div class="bg-primary-600 p-5 rounded-2xl text-white shadow-lg">
                    <span class="text-[10px] font-black uppercase opacity-70 block mb-1">Nhóm ngành</span>
                    <h3 id="ovJobFamily" class="text-sm font-bold">---</h3>
                </div>
                <div class="bg-white/80 p-5 rounded-2xl border border-slate-100">
                    <h4 class="text-[10px] font-black uppercase text-slate-400 mb-3">Hướng phát triển</h4>
                    <div id="ovDevOpp" class="text-xs font-semibold text-slate-600 space-y-2">---</div>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGE 2: DASHBOARD -->
    <div id="page2" class="hidden h-full flex flex-col gap-3 animate-up overflow-hidden">
        <!-- Header -->
        <div class="flex items-center justify-between shrink-0">
            <button onclick="showPage(1.5)" class="p-2 bg-white/80 border border-slate-100 rounded-full shadow-sm"><i data-lucide="arrow-left" class="w-5 h-5 text-slate-600"></i></button>
            <div class="text-right">
                <h2 id="detailFuncTitle" class="text-sm font-black text-slate-900 uppercase leading-none">---</h2>
                <span id="detailJobFamily" class="inline-block mt-1 bg-primary-100 text-primary-600 text-[9px] font-black px-2 py-0.5 rounded-full uppercase">---</span>
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-3 overflow-hidden">
            <!-- Mobile Stepper (Horizontal) -->
            <div class="col-span-1 lg:col-span-3 lg:h-full flex lg:flex-col gap-2 overflow-x-auto lg:overflow-y-auto no-scrollbar py-1 lg:py-4 px-1 bg-white/30 rounded-2xl border border-white/50 lg:hidden">
                <div id="mobileStepper" class="flex gap-2 w-full"></div>
            </div>

            <!-- Main Info -->
            <div class="col-span-1 lg:col-span-9 flex flex-col glass-panel rounded-3xl overflow-hidden shadow-inner">
                <!-- Role Card -->
                <div class="p-4 md:p-6 border-b border-slate-100 bg-white/50 flex gap-4 items-center">
                    <div class="w-16 h-16 md:w-20 md:h-20 bg-white rounded-2xl shadow-sm border border-slate-50 flex-shrink-0 p-2 overflow-hidden">
                        <img id="msIcon" src="" class="w-full h-full object-contain">
                    </div>
                    <div class="min-w-0">
                        <span id="msLevelLabel" class="text-[9px] font-black text-primary-600 uppercase bg-primary-50 px-2 py-0.5 rounded-md">---</span>
                        <h1 id="roleTitleLabel" class="text-lg font-black text-slate-900 truncate">---</h1>
                        <p id="rolePurposeLabel" class="text-xs text-slate-500 italic truncate">---</p>
                    </div>
                </div>

                <!-- Tabs Navigation -->
                <div class="flex overflow-x-auto custom-scrollbar border-b border-slate-100 bg-white/20 shrink-0">
                    <button class="tab-btn active" onclick="switchTab('tab-works')">CÔNG VIỆC</button>
                    <button class="tab-btn" onclick="switchTab('tab-skills')">NĂNG LỰC</button>
                    <button class="tab-btn" onclick="switchTab('tab-learning')">ĐÀO TẠO</button>
                    <button class="tab-btn" onclick="switchTab('tab-next')">THĂNG TIẾN</button>
                </div>

                <!-- Tab Views -->
                <div id="detailView" class="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar text-sm">
                    <div id="tab-works" class="tab-content animate-up space-y-6">
                        <div>
                            <h4 class="font-black text-slate-400 uppercase text-[10px] mb-3 flex items-center gap-2"><i data-lucide="list" class="w-3.5 h-3.5"></i> Trách nhiệm chính</h4>
                            <div id="responsibilitiesList" class="space-y-2"></div>
                        </div>
                    </div>
                    <div id="tab-skills" class="tab-content hidden animate-up space-y-6">
                        <div id="competenciesContainer" class="space-y-4"></div>
                    </div>
                    <div id="tab-learning" class="tab-content hidden animate-up space-y-4">
                        <div id="trainingList" class="grid grid-cols-1 gap-3"></div>
                    </div>
                    <div id="tab-next" class="tab-content hidden animate-up space-y-4">
                        <div id="promotionList" class="space-y-2"></div>
                        <div class="p-4 bg-primary-50 rounded-2xl">
                            <span class="text-[9px] font-black text-primary-600 uppercase">Mục tiêu tiếp theo</span>
                            <p id="nextTargetRole" class="font-bold text-slate-800">---</p>
                        </div>
                    </div>
                </div>

                <!-- Footer Nav -->
                <div class="p-3 border-t border-slate-100 bg-white/50 flex items-center justify-between shrink-0">
                    <button id="prevBtn" class="text-xs font-black text-slate-400 p-2"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                    <div id="pageCounter" class="text-[10px] font-black text-slate-400">01 / 05</div>
                    <button id="nextBtn" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Tiếp</button>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    let masterData = [];
    let currentRoleMilestones = [];
    let currentIdx = 0;
    let selectedRoleValue = "";
    
    lucide.createIcons();

    // -- LOGIC EXCEL --
    const excelInput = document.getElementById('excelInput');
    excelInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);
            masterData = json;
            
            const roles = [...new Set(json.map(d => d.function_title))].filter(Boolean);
            renderRoleDropdown(roles);
            
            document.getElementById('dropdownTrigger').classList.remove('opacity-60', 'cursor-not-allowed');
            document.getElementById('dropdownSelectedText').innerText = "Chọn lộ trình phát triển...";
        };
        reader.readAsArrayBuffer(file);
    });

    function renderRoleDropdown(roles) {
        const list = document.getElementById('customRoleList');
        list.innerHTML = '';
        roles.sort().forEach(r => {
            const li = document.createElement('li');
            li.className = 'px-4 py-2 text-sm font-bold text-slate-600 hover:bg-primary-50 cursor-pointer rounded-lg mb-1';
            li.innerText = r;
            li.onclick = () => {
                selectedRoleValue = r;
                document.getElementById('dropdownSelectedText').innerText = r;
                document.getElementById('dropdownSelectedText').classList.add('text-slate-900');
                document.getElementById('dropdownMenu').classList.add('hidden');
                document.getElementById('btnStart').classList.remove('opacity-60', 'cursor-not-allowed');
                document.getElementById('btnStart').classList.add('bg-slate-900');
            };
            list.appendChild(li);
        });
    }

    document.getElementById('dropdownTrigger').onclick = () => document.getElementById('dropdownMenu').classList.toggle('hidden');

    document.getElementById('btnStart').onclick = () => {
        if (!selectedRoleValue) return;
        currentRoleMilestones = masterData.filter(d => d.function_title === selectedRoleValue)
            .sort((a,b) => (a.milestone_order || 0) - (b.milestone_order || 0));
        showPage(1.5);
    };

    function showPage(n) {
        document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
        const bg = document.getElementById('bgOverlay');
        
        if (n === 1) {
            document.getElementById('page1').classList.remove('hidden');
            bg.style.backgroundImage = "url('https://images.unsplash.com/photo-1516110833967-0b5716ca1387?auto=format&fit=crop&q=80')";
        } else if (n === 1.5) {
            document.getElementById('pageOverview').classList.remove('hidden');
            renderAdaptiveRoadmap();
        } else {
            document.getElementById('page2').classList.remove('hidden');
            renderDashboard();
        }
        lucide.createIcons();
    }

    // Tự động thay đổi cách hiển thị Roadmap dựa trên kích thước màn hình
    function renderAdaptiveRoadmap() {
        const content = document.getElementById('roadmapContent');
        const isMobile = window.innerWidth < 1024;
        content.innerHTML = '';

        if (isMobile) {
            // Render Vertical List for Mobile
            const list = document.createElement('div');
            list.className = 'mobile-roadmap-list animate-up';
            currentRoleMilestones.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'node-card border-l-4 flex items-center gap-4';
                card.style.borderLeftColor = ['#0ea5e9', '#10b981', '#f59e0b', '#8b5cf6'][i % 4];
                card.innerHTML = `
                    <div class="node-circle shrink-0" style="background: #0f172a">${i+1}</div>
                    <div class="min-w-0">
                        <div class="text-[9px] font-black uppercase text-slate-400">${m.milestone_level}</div>
                        <div class="text-sm font-bold text-slate-900 truncate">${m.role_title}</div>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 ml-auto text-slate-300"></i>
                `;
                card.onclick = () => { currentIdx = i; showPage(2); };
                list.appendChild(card);
            });
            content.appendChild(list);
        } else {
            // Render Original Staircase for Desktop (simplified logic for stability)
            const wrapper = document.createElement('div');
            wrapper.className = 'relative w-full h-full p-10';
            currentRoleMilestones.forEach((m, i) => {
                const node = document.createElement('div');
                node.className = 'node-card absolute';
                node.style.left = `${10 + i * 15}%`;
                node.style.bottom = `${10 + i * 15}%`;
                node.innerHTML = `
                    <div class="node-circle mb-2" style="background: #0ea5e9">${i+1}</div>
                    <div class="text-[10px] font-black uppercase text-slate-400">${m.milestone_level}</div>
                    <div class="text-sm font-bold text-slate-800">${m.role_title}</div>
                `;
                node.onclick = () => { currentIdx = i; showPage(2); };
                wrapper.appendChild(node);
            });
            content.appendChild(wrapper);
        }
        lucide.createIcons();
    }

    function renderDashboard() {
        const data = currentRoleMilestones[currentIdx];
        if(!data) return;

        document.getElementById('detailFuncTitle').innerText = data.function_title;
        document.getElementById('detailJobFamily').innerText = data.job_family || '---';
        document.getElementById('msLevelLabel').innerText = data.milestone_level;
        document.getElementById('roleTitleLabel').innerText = data.role_title;
        document.getElementById('rolePurposeLabel').innerText = data.role_purpose || '';
        document.getElementById('msIcon').src = data.icon_image_path || 'https://cdn-icons-png.flaticon.com/512/1063/1063376.png';
        document.getElementById('nextTargetRole').innerText = data.next_target_role || '---';

        renderList('responsibilitiesList', data.key_responsibilities, 'check');
        renderList('promotionList', data.promotion_criteria, 'trending-up');
        
        // Competencies
        const comp = document.getElementById('competenciesContainer');
        comp.innerHTML = '';
        if(data.competencies_to_develop) {
            data.competencies_to_develop.split('\n').filter(s=>s.trim()).forEach(s => {
                const d = document.createElement('div');
                d.innerHTML = `<div class="flex justify-between text-[10px] font-bold mb-1"><span>${s}</span><span>80%</span></div>
                               <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-primary-500 w-[80%]"></div></div>`;
                comp.appendChild(d);
            });
        }

        document.getElementById('pageCounter').innerText = `${currentIdx + 1} / ${currentRoleMilestones.length}`;
        document.getElementById('prevBtn').onclick = () => { if(currentIdx > 0) { currentIdx--; renderDashboard(); } };
        document.getElementById('nextBtn').onclick = () => { 
            if(currentIdx < currentRoleMilestones.length - 1) { currentIdx++; renderDashboard(); }
            else { showPage(1); }
        };
        
        lucide.createIcons();
    }

    function renderList(id, text, icon) {
        const el = document.getElementById(id);
        el.innerHTML = '';
        if(!text) return;
        text.split('\n').filter(s => s.trim()).forEach(s => {
            const d = document.createElement('div');
            d.className = 'flex gap-2 items-start mb-2';
            d.innerHTML = `<i data-lucide="${icon}" class="w-3.5 h-3.5 mt-0.5 text-primary-500 shrink-0"></i> <span class="text-xs font-medium text-slate-600">${s}</span>`;
            el.appendChild(d);
        });
    }

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        lucide.createIcons();
    }

    function toggleThemeMenu(e) {
        e.stopPropagation();
        document.getElementById('themeMenu').classList.toggle('hidden');
    }

    function setTheme(t) {
        if(t === 'default') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', t);
        document.getElementById('themeMenu').classList.add('hidden');
    }

    window.onresize = () => {
        if(!document.getElementById('pageOverview').classList.contains('hidden')) renderAdaptiveRoadmap();
    };

    showPage(1);
</script>
</body>
</html>
