<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Model Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .model-card:hover { transform: translateY(-2px); transition: all 0.2s; }
        .badge { @apply px-2 py-0.5 rounded text-[10px] font-bold uppercase; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto p-4 md:p-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Gemini Model Explorer</h1>
            <p class="text-slate-600">Kiểm tra các mô hình AI khả dụng cho API Key của bạn</p>
        </header>

        <!-- API Key Input Section (Dành cho chạy local) -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1 w-full">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">API Key của bạn:</label>
                    <input 
                        type="password" 
                        id="api-key-input" 
                        placeholder="Nhập API Key vào đây (nếu chạy local)..." 
                        class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                    >
                </div>
                <button 
                    onclick="fetchModels()" 
                    id="fetch-btn"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-2 rounded-lg font-bold shadow-lg shadow-indigo-100 transition-all whitespace-nowrap"
                >
                    Kiểm tra danh sách
                </button>
            </div>
            <p class="text-[11px] text-slate-400 mt-3">
                * Lưu ý: Trong môi trường Canvas này, bạn có thể để trống nếu hệ thống đã tự cấp Key. Nếu chạy trên máy tính cá nhân, hãy nhập Key từ Google AI Studio.
            </p>
        </div>

        <!-- Status & Loading -->
        <div id="status-area" class="mb-6 hidden">
            <div id="status-message" class="p-4 rounded-xl text-sm flex items-center gap-3"></div>
        </div>

        <!-- Models Grid -->
        <div id="models-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script>
        // Mặc định sử dụng API Key từ môi trường nếu có
        const envApiKey = ""; 

        async function fetchModels() {
            const inputKey = document.getElementById('api-key-input').value;
            const apiKey = inputKey || envApiKey;
            const btn = document.getElementById('fetch-btn');
            const listContainer = document.getElementById('models-list');
            const statusArea = document.getElementById('status-area');
            const statusMsg = document.getElementById('status-message');

            if (!apiKey) {
                showStatus("Vui lòng nhập API Key hoặc chạy trong môi trường có sẵn Key.", "error");
                return;
            }

            // Reset UI
            listContainer.innerHTML = "";
            btn.disabled = true;
            btn.textContent = "Đang quét...";
            showStatus("Đang truy vấn danh sách mô hình từ Google API...", "info");

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `Lỗi HTTP ${response.status}`);
                }

                const data = await response.json();
                const models = data.models || [];

                if (models.length === 0) {
                    showStatus("Không tìm thấy mô hình nào khả dụng cho Key này.", "warning");
                } else {
                    showStatus(`Tìm thấy ${models.length} mô hình khả dụng.`, "success");
                    renderModels(models);
                }
            } catch (error) {
                showStatus(`Lỗi: ${error.message}`, "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "Kiểm tra danh sách";
            }
        }

        function renderModels(models) {
            const listContainer = document.getElementById('models-list');
            
            models.forEach(model => {
                const card = document.createElement('div');
                card.className = "model-card bg-white border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-md flex flex-col";
                
                // Trích xuất tên ngắn gọn (ví dụ: gemini-1.5-flash)
                const shortName = model.name.replace('models/', '');
                
                const methods = model.supportedGenerationMethods || [];
                const methodBadges = methods.map(m => 
                    `<span class="badge ${m === 'generateContent' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600'}">${m}</span>`
                ).join(' ');

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-bold text-slate-800 text-lg break-all">${shortName}</h3>
                        <button 
                            onclick="copyToClipboard('${shortName}')"
                            class="text-indigo-600 hover:bg-indigo-50 text-[10px] px-2 py-1 rounded border border-indigo-200"
                        >
                            Sao chép ID
                        </button>
                    </div>
                    <p class="text-sm text-slate-500 mb-4 flex-1 leading-relaxed">
                        ${model.description || "Không có mô tả."}
                    </p>
                    <div class="border-t border-slate-100 pt-4 mt-auto">
                        <div class="flex flex-wrap gap-2 mb-3">
                            ${methodBadges}
                        </div>
                        <div class="flex items-center justify-between text-[11px] text-slate-400">
                            <span>Input Tokens: ${model.inputTokenLimit?.toLocaleString() || 'N/A'}</span>
                            <span>Output Tokens: ${model.outputTokenLimit?.toLocaleString() || 'N/A'}</span>
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function showStatus(msg, type) {
            const statusArea = document.getElementById('status-area');
            const statusMsg = document.getElementById('status-message');
            statusArea.classList.remove('hidden');
            
            const styles = {
                error: "bg-red-50 text-red-700 border border-red-100",
                success: "bg-emerald-50 text-emerald-700 border border-emerald-100",
                info: "bg-blue-50 text-blue-700 border border-blue-100",
                warning: "bg-amber-50 text-amber-700 border border-amber-100"
            };
            
            statusMsg.className = `p-4 rounded-xl text-sm flex items-center gap-3 ${styles[type]}`;
            statusMsg.innerHTML = `
                <span class="font-medium">${msg}</span>
            `;
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert(`Đã sao chép: ${text}`);
        }

        // Tự động quét khi load trang nếu có sẵn key
        window.onload = () => {
            if (envApiKey) fetchModels();
        };
    </script>
</body>
</html>
