<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chatbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        .markdown-content p { margin-bottom: 0.75rem; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content code { background-color: #f1f5f9; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875em; }
        .markdown-content pre { background-color: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; }
        
        @keyframes typing { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .dot { animation: typing 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
            </div>
            <div>
                <h1 class="font-bold text-slate-800 leading-tight">Gemini Assistant</h1>
                <p class="text-xs text-green-500 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> Sẵn sàng
                </p>
            </div>
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
        <div class="flex gap-3 max-w-3xl">
            <div class="w-8 h-8 rounded-full bg-slate-200 flex-shrink-0 flex items-center justify-center text-slate-600 text-xs">AI</div>
            <div class="bg-white border border-slate-200 rounded-2xl rounded-tl-none p-4 shadow-sm text-slate-700">
                Chào bạn! Tôi đã cập nhật mã nguồn để khắc phục lỗi 404. Bạn hãy thử gửi tin nhắn lại nhé.
            </div>
        </div>
    </main>

    <div id="typing-indicator" class="hidden px-6 py-2">
        <div class="flex items-center gap-2 text-slate-400 text-sm italic">
            <span>Gemini đang xử lý</span>
            <div class="flex gap-1">
                <span class="dot w-1 h-1 bg-slate-400 rounded-full"></span>
                <span class="dot w-1 h-1 bg-slate-400 rounded-full"></span>
                <span class="dot w-1 h-1 bg-slate-400 rounded-full"></span>
            </div>
        </div>
    </div>

    <footer class="p-4 bg-white border-t border-slate-200">
        <div class="max-w-4xl mx-auto flex gap-2">
            <textarea 
                id="user-input" 
                rows="1" 
                placeholder="Nhập nội dung..." 
                class="flex-1 bg-slate-100 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 resize-none transition-all outline-none"
            ></textarea>
            <button 
                id="send-btn"
                class="bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-xl transition-colors shadow-lg shadow-indigo-200 disabled:opacity-50"
            >
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </footer>

    <script>
        const apiKey = ""; // API Key được cấp tự động trong môi trường này
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // CHÚ Ý: Nếu bạn dùng ngoài môi trường này, hãy thay model bằng 'gemini-1.5-flash'
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025"; 

        async function handleSend() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            appendMessage('user', message);
            typingIndicator.classList.remove('hidden');
            scrollToBottom();

            try {
                const responseText = await callGeminiAPI(message);
                appendMessage('ai', responseText);
            } catch (error) {
                console.error(error);
                appendMessage('error', `Lỗi: ${error.message}. (Gợi ý: Kiểm tra lại Model Name hoặc API Key nếu bạn đang chạy local)`);
            } finally {
                typingIndicator.classList.add('hidden');
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
                scrollToBottom();
            }
        }

        async function callGeminiAPI(prompt, retries = 3, delay = 1000) {
            // URL chuẩn: v1beta/models/{model}:generateContent
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }]
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.status === 404) {
                        throw new Error("Không tìm thấy Model (404). Có thể model này chưa được hỗ trợ cho Key của bạn.");
                    }

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `Lỗi HTTP ${response.status}`);
                    }

                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "Không có phản hồi.";
                } catch (error) {
                    if (i === retries - 1 || error.message.includes("404")) throw error;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex gap-3 ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in duration-300`;

            const isUser = role === 'user';
            const bubbleClass = isUser 
                ? 'bg-indigo-600 text-white rounded-2xl rounded-tr-none' 
                : role === 'error' 
                    ? 'bg-red-50 text-red-600 border border-red-200 rounded-2xl' 
                    : 'bg-white border border-slate-200 text-slate-700 rounded-2xl rounded-tl-none';

            wrapper.innerHTML = `
                ${!isUser ? '<div class="w-8 h-8 rounded-full bg-slate-200 flex-shrink-0 flex items-center justify-center text-xs">AI</div>' : ''}
                <div class="${bubbleClass} p-4 shadow-sm max-w-[85%]">
                    ${role === 'ai' ? `<div class="markdown-content">${marked.parse(text)}</div>` : `<div class="whitespace-pre-wrap">${text}</div>`}
                </div>
                ${isUser ? '<div class="w-8 h-8 rounded-full bg-indigo-100 flex-shrink-0 flex items-center justify-center text-indigo-600 text-xs">Bạn</div>' : ''}
            `;

            chatContainer.appendChild(wrapper);
        }

        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }
        userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
        sendBtn.addEventListener('click', handleSend);
    </script>
</body>
</html>
